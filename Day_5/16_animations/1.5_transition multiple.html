<!doctype html>
<html>
  <head>
    <style>
      div {
        width: 100px;
        height: 100px;
        background-color: blue;
        transition:
          width 2s,
          height 4s,
          background-color 3s;
      }

      div:hover {
        width: 300px;
        height: 200px;
        background-color: red;
      }
    </style>
  </head>
  <body>
    <h1>The transition Property</h1>

    <p>Hover over the div element below, to see the transition effect:</p>
    <div></div>
  </body>
</html>
