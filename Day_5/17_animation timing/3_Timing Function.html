<!doctype html>
<html>
  <head>
    <style>
      div {
        width: 100px;
        height: 50px;
        background-color: red;
        font-weight: bold;
        position: relative;
        animation-name: myAnimation;
        animation-duration: 5s;
        animation-fill-mode: forwards;
      }

      #div1 {
        /* Constant speed from start to end */
        animation-timing-function: linear;
      }
      #div2 {
        /* Starts slow → speeds up → slows down at end */
        animation-timing-function: ease;
      }
      #div3 {
        /* Starts slow → speeds up at the end */
        animation-timing-function: ease-in;
      }
      #div4 {
        /* Starts fast → slows down at the end */
        animation-timing-function: ease-out;
      }
      #div5 {
        /* Starts slow → speeds up → slows down */
        animation-timing-function: ease-in-out;
      }

      @keyframes myAnimation {
        from {
          left: 0px;
        }
        to {
          left: 300px;
        }
      }
    </style>
  </head>
  <body>
    <h1>CSS animation-timing-function Property</h1>

    <p>
      The animation-timing-function property specifies the speed curve of the
      animation. The following example shows some of the different speed curves
      that can be used:
    </p>

    <div id="div1">linear</div>
    <div id="div2">ease</div>
    <div id="div3">ease-in</div>
    <div id="div4">ease-out</div>
    <div id="div5">ease-in-out</div>
  </body>
</html>
