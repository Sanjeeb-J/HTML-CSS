<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Day 5: Motion Challenge</title>
  <style>
    body {
      background-color: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }

    .card {
      width: 300px;
      padding: 40px;
      background-color: #2d2d2d;
      color: white;
      text-align: center;
      border-radius: 15px;
      position: relative;
      cursor: pointer;
      border: 1px solid #444;

      transition: background-color 0.5s ease, transform 0.5s ease, box-shadow 0.5s ease;
    }

    .card:hover {
      background-color: #3d3d3d;
      transform: scale(1.05); 
      box-shadow: 0px 10px 30px rgba(0, 255, 136, 0.3);
    }

    .badge {
      width: 20px;
      height: 20px;
      background-color: #00ff88;
      border-radius: 50%;
      position: absolute;
      top: -10px;
      right: -10px;
      
      animation: pulse 1.5s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from {
        transform: scale(1);
        opacity: 1;
        box-shadow: 0 0 0px #00ff88;
      }
      to {
        transform: scale(1.5);
        opacity: 0.7;
        box-shadow: 0 0 15px #00ff88;
      }
    }

    h2 { color: #00ff88; }
    p { color: #ccc; line-height: 1.5; }
  </style>
</head>
<body>

  <div class="card">
    <div class="badge"></div>
    <h2>Pro Feature</h2>
    <p>Hover over this card to see the <strong>Transition</strong>, and look at the green badge for the <strong>Animation</strong>.</p>
  </div>

</body>
</html>
